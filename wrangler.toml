name = "freeappstore-agent"
main = "src/index.ts"
compatibility_date = "2025-05-01"
workers_dev = true

[[routes]]
pattern = "agent.freeappstore.online/*"
zone_name = "freeappstore.online"

[durable_objects]
bindings = [
  { name = "SESSION", class_name = "AgentSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentSession"]

# Service binding to the platform backend — used to read user API keys
# from the encrypted vault (D1) instead of receiving them from the browser.
[[services]]
binding = "PLATFORM"
service = "freeappstore-api"

[[d1_databases]]
binding = "DB"
database_name = "fas"
database_id = "a32701c0-5a56-4a12-810d-485166202e39"

[vars]
STORE = "apps"
VAPID_PUBLIC_KEY = "BB9nIKmrVFJQJWZ4MiXzv3eN2UfGtuXESqVlQMobPiZiTmS8cQuldiXNreIV03dCo3Jkkflk6UDoAzWMvhNXCuw"

# Secrets (set via `wrangler secret put`):
# GITHUB_TOKEN       — org-level PAT for provisioning + pushing code
# VAPID_PRIVATE_KEY  — VAPID private key for web push notifications
